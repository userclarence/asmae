<!DOCTYPE html>
<html>
<head>
<title>The Universe Chose Asmae</title>
<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:monospace;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  transition:2s;
  animation: twinkle 2s infinite;
}

@keyframes twinkle{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}

#text{
  position:absolute;
  font-size:32px;
  max-width:600px;
  opacity:0;
  transition:2s;
}
</style>
</head>
<body>

<div id="text">
Dear Asmae...<br><br>
I found the brightest star in the universe.<br><br>
Kanbghiiik ❤️
</div>

<script>

// Create stars
let stars=[];
const starCount = 500;

for(let i=0;i<starCount;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*window.innerWidth+"px";
  star.style.top=Math.random()*window.innerHeight+"px";
  document.body.appendChild(star);
  stars.push(star);
}

// ASMAE coordinates (approx grid points)
const letters = [
  // A
  [0,4],[0,5],[1,3],[1,6],[2,2],[2,7],[3,1],[3,8],[4,0],[4,9],[2,4],[2,5],[2,6],
  // S
  [0,12],[0,13],[1,11],[1,14],[2,12],[2,13],[3,11],[3,14],[4,12],[4,13],
  // M
  [0,16],[1,16],[2,17],[3,18],[4,16],[1,19],[0,20],[1,20],[2,20],[3,20],[4,20],
  // A
  [0,22],[0,23],[1,21],[1,24],[2,20],[2,25],[3,19],[3,26],[4,18],[4,27],[2,22],[2,23],[2,24],
  // E
  [0,29],[1,29],[2,29],[3,29],[4,29],[0,30],[2,30],[4,30],[0,31],[2,31],[4,31]
];

function formASMAE(){
  let startX = window.innerWidth/2 - 150;
  let startY = window.innerHeight/2 - 50;
  for(let i=0;i<letters.length;i++){
    if(stars[i]){
      stars[i].style.left = startX + letters[i][1]*8 + "px";
      stars[i].style.top = startY + letters[i][0]*10 + "px";
    }
  }
  // Fade in message after forming letters
  setTimeout(()=>{document.getElementById("text").style.opacity=1;},2000);
}

setTimeout(formASMAE,3000);

</script>
</body>
</html>
