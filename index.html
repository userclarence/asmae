<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Universe Chose Asmae</title>

<style>
body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #1b052c 0%, #05010a 80%, #000000 100%);
  position: relative;
}

.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 6px white;
  animation: twinkle 3s infinite;
  transition: left 2.5s cubic-bezier(0.4, 0, 0.2, 1), 
              top 2.5s cubic-bezier(0.4, 0, 0.2, 1), 
              box-shadow 2.5s ease, background 2.5s ease;
}

@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0.2; transform: scale(0.8); }
}

.glowing-star {
  background: #ff9a9e !important; 
  box-shadow: 0 0 15px #ff9a9e, 0 0 30px #fecfef !important;
  animation: pulseGlow 2s infinite ease-in-out !important;
  z-index: 10;
}

@keyframes pulseGlow {
  0%, 100% { transform: scale(1.2); box-shadow: 0 0 15px #ff9a9e; }
  50% { transform: scale(1.6); box-shadow: 0 0 25px #ff9a9e, 0 0 40px #fecfef; }
}

.shooting {
  position: absolute;
  width: 2px;
  height: 100px;
  background: linear-gradient(rgba(255,182,193,0.8), transparent);
  transform: rotate(45deg);
  opacity: 0;
}

@keyframes shoot {
  0% { opacity: 1; transform: translate(0, 0) rotate(45deg); }
  100% { opacity: 0; transform: translate(800px, 800px) rotate(45deg); }
}

#text {
  position: absolute;
  bottom: 15%; 
  width: 90%; /* Prevents text from touching phone edges */
  left: 5%;
  text-align: center;
  font-family: Arial, Helvetica, sans-serif;
  /* Automatically scales between 24px (mobile) and 50px (desktop) */
  font-size: clamp(24px, 7vw, 50px);
  font-weight: bold;
  color: #ffdae0;
  text-shadow: 0 0 12px rgba(255, 154, 158, 0.8);
  opacity: 0;
  line-height: 1.4;
  z-index: 5;
}

.cursor {
  border-right: 4px solid #ffdae0;
  animation: blink 1s infinite;
  margin-left: 5px;
}

@keyframes blink {
  0%, 100% { border-color: transparent }
  50% { border-color: #ffdae0 }
}
</style>
</head>

<body>

<div id="text"></div>

<script>
window.onload = () => {
  let stars = []
  // Slightly reduced star count so older phones don't lag
  const starCount = 500 

  for(let i=0; i<starCount; i++){
    let star = document.createElement("div")
    star.className = "star"
    star.style.left = Math.random() * window.innerWidth + "px"
    star.style.top = Math.random() * window.innerHeight + "px"
    star.style.animationDelay = (Math.random() * 3) + "s"
    document.body.appendChild(star)
    stars.push(star)
  }

  function shootingStar(){
    let s = document.createElement("div")
    s.className = "shooting"
    s.style.left = Math.random() * window.innerWidth + "px"
    s.style.top = Math.random() * (window.innerHeight / 2) + "px"
    document.body.appendChild(s)
    s.style.animation = "shoot 1.5s linear"
    setTimeout(() => { s.remove() }, 1500)
  }

  setInterval(shootingStar, 3500)

  // PERFECTED LETTER MAP
  const letters = [
    // A (Cols 0-4)
    [0,2], [1,1], [1,3], [2,0], [2,1], [2,2], [2,3], [2,4], [3,0], [3,4], [4,0], [4,4],
    // S (Cols 6-10)
    [0,6], [0,7], [0,8], [0,9], [0,10], [1,6], [2,6], [2,7], [2,8], [2,9], [2,10], [3,10], [4,6], [4,7], [4,8], [4,9], [4,10],
    // M (Cols 12-16)
    [0,12], [0,16], [1,12], [1,13], [1,15], [1,16], [2,12], [2,14], [2,16], [3,12], [3,16], [4,12], [4,16],
    // A (Cols 18-22)
    [0,20], [1,19], [1,21], [2,18], [2,19], [2,20], [2,21], [2,22], [3,18], [3,22], [4,18], [4,22],
    // E (Cols 24-28)
    [0,24], [0,25], [0,26], [0,27], [0,28], [1,24], [2,24], [2,25], [2,26], [2,27], [3,24], [4,24], [4,25], [4,26], [4,27], [4,28]
  ]

  function formASMAE(){
    // DYNAMIC SCALING FOR MOBILE:
    // This calculates the width of the screen and shrinks the letters if needed so they always fit perfectly.
    let maxLetterWidth = (window.innerWidth * 0.9) / 28; // Max width based on screen size
    let letterWidth = Math.min(22, maxLetterWidth); // Won't get bigger than 22px on desktop
    let letterHeight = letterWidth * 1.36; // Keeps the letters looking tall, not squished
    
    let totalWidth = 28 * letterWidth; 
    
    let startX = (window.innerWidth / 2) - (totalWidth / 2);
    // Pushes the name up slightly on mobile so the text fits nicely underneath
    let startY = (window.innerHeight / 2) - (letterHeight * 3); 

    for(let i=0; i<letters.length; i++){
      if(stars[i]){
        stars[i].style.left = startX + letters[i][1] * letterWidth + "px"
        stars[i].style.top = startY + letters[i][0] * letterHeight + "px"
        stars[i].classList.add("glowing-star")
        stars[i].style.animationDelay = "0s" 
      }
    }
    
    setTimeout(typeMessage, 3500)
  }

  const message = "kanbghiiik bzaaaf<br>a ahsan bnt<br>3rft f7yati ❤️"
  let i = 0
  let isTag = false;

  function typeMessage(){
    let textDiv = document.getElementById("text")
    textDiv.style.opacity = 1

    function typing(){
      if(i < message.length){
        if(message.charAt(i) === '<') isTag = true;
        
        textDiv.innerHTML = message.substring(0, i + 1) + "<span class='cursor'></span>"
        i++

        if(message.charAt(i-1) === '>') isTag = false;
        
        let typingSpeed = isTag ? 0 : (Math.random() * 50 + 40); 
        setTimeout(typing, typingSpeed)
      } else {
        textDiv.innerHTML = message
      }
    }
    typing()
  }

  setTimeout(formASMAE, 2000)
}
</script>
</body>
</html>
